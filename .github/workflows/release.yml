name: Semantic Release

on:
  push:
    branches:
      - main
      - rc

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version: ${{ steps.release.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install semantic-release
        run: npm install

      - name: Run semantic-release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  trigger_rc_deploy:
    runs-on: ubuntu-latest
    needs: release
    if: |
      needs.release.outputs.new_release_published == 'true' &&
      contains(needs.release.outputs.new_release_version, 'rc')
    steps:
      - name: Dispatch RC deploy to infra repo
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.INFRA_DISPATCH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository_owner }}/furry-dating-infra/dispatches \
            -d "{\
              \"event_type\": \"rc-release\",\
              \"client_payload\": {\
                \"version\": \"${{ needs.release.outputs.new_release_version }}\",\
                \"image_tag\": \"v${{ needs.release.outputs.new_release_version }}\",\
                \"app_ref\": \"v${{ needs.release.outputs.new_release_version }}\"\
              }\
            }"
          echo "Dispatched RC deploy for v${{ needs.release.outputs.new_release_version }}"
