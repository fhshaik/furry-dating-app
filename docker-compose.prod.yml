services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=${BACKEND_URL:-https://api.example.com}
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - MYSQL_HOST=${MYSQL_HOST:?MYSQL_HOST must be set for external MySQL}
      - MYSQL_PORT=${MYSQL_PORT:?MYSQL_PORT must be set for external MySQL}
      - MYSQL_USER=${MYSQL_USER:?MYSQL_USER must be set for external MySQL}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:?MYSQL_PASSWORD must be set for external MySQL}
      - MYSQL_DATABASE=${MYSQL_DATABASE:?MYSQL_DATABASE must be set for external MySQL}
    restart: unless-stopped
